# ═══════════════════════════════════════════════════════════════
#  PupCare — Configuración de Netlify
#  Este archivo le dice a Netlify cómo construir y desplegar la app
# ═══════════════════════════════════════════════════════════════

[build]
  # Carpeta donde está el código frontend (raíz del repo)
  publish = "."

  # Carpeta donde están las Netlify Functions
  functions = "netlify/functions"

# ── Encabezados de seguridad globales ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Encabezados específicos para las Functions ───────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# ── Redirigir todo a index.html (SPA) ───────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
