# netlify.toml
# Configuración de despliegue para Netlify
# Documentación: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Directorio de publicación (raíz del proyecto)
  publish = "."

  # Sin comando de build ya que es HTML/CSS/JS puro
  # Si en el futuro agregas un bundler, ponlo aquí:
  # command = "npm run build"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔒 Cabeceras de Seguridad
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[[headers]]
  for = "/*"
  [headers.values]
    # Previene ataques de clickjacking
    X-Frame-Options = "DENY"
    
    # Previene MIME sniffing
    X-Content-Type-Options = "nosniff"
    
    # Habilita protección XSS en navegadores más viejos
    X-XSS-Protection = "1; mode=block"
    
    # Controla información de referrer
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Política de permisos del navegador
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self)"
    
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebaseapp.com https://*.firebase.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebase.com blob:; connect-src 'self' https://*.googleapis.com https://*.firebase.com https://*.firebaseio.com wss://*.firebaseio.com; frame-src 'none';"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⚡ Service Worker - No cachear en Netlify
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📦 Cache para Assets Estáticos
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔀 Redirecciones
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Redirigir HTTP a HTTPS (Netlify lo hace automáticamente,
# pero lo dejamos explícito)
[[redirects]]
  from = "http://pupcare.netlify.app/*"
  to = "https://pupcare.netlify.app/:splat"
  status = 301
  force = true

# SPA fallback - Todas las rutas no encontradas van a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
