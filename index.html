<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PupCare 🐾</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PupCare">
  <meta name="description" content="El cuidado de Guts en un solo lugar">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ⏳ LOADING -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <p>Cargando PupCare...</p>
  </div>

  <!-- 🔐 AUTH -->
  <div id="authScreen" style="display:none">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-icon">🐾</span>
        <h1>PupCare</h1>
        <p>El cuidado de Guts en un solo lugar</p>
      </div>

      <!-- Login -->
      <div id="loginForm">
        <button class="btn-google btn-full" onclick="loginWithGoogle()">
          <img src="assets/icons/google.svg" width="20" height="20" alt="Google">
          Continuar con Google
        </button>
        <div class="auth-divider">o inicia con correo</div>
        <div class="field">
          <label for="loginEmail">Correo</label>
          <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-primary btn-full" onclick="loginWithEmail()">Iniciar Sesión</button>
        <button class="btn-text" onclick="showForgotPassword()">¿Olvidaste tu contraseña?</button>
        <div class="auth-divider">¿No tienes cuenta?</div>
        <button class="btn-secondary btn-full" onclick="showRegister()">Crear Cuenta</button>
      </div>

      <!-- Register -->
      <div id="registerForm" style="display:none">
        <button class="btn-google btn-full" onclick="loginWithGoogle()">
          <img src="assets/icons/google.svg" width="20" height="20" alt="Google">
          Registrarse con Google
        </button>
        <div class="auth-divider">o regístrate con correo</div>
        <div class="field">
          <label for="regName">Tu nombre</label>
          <input type="text" id="regName" placeholder="Tu nombre" autocomplete="name">
        </div>
        <div class="field">
          <label for="regEmail">Correo</label>
          <input type="email" id="regEmail" placeholder="correo@ejemplo.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="regPassword">Contraseña</label>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <button class="btn-primary btn-full" onclick="register()">Crear Cuenta</button>
        <button class="btn-text" onclick="showLogin()">← Volver al inicio de sesión</button>
      </div>

      <!-- Forgot -->
      <div id="forgotForm" style="display:none">
        <p class="auth-hint">Te enviaremos un enlace para restablecer tu contraseña.</p>
        <div class="field">
          <label for="forgotEmail">Correo</label>
          <input type="email" id="forgotEmail" placeholder="correo@ejemplo.com">
        </div>
        <button class="btn-primary btn-full" onclick="resetPassword()">Enviar Correo</button>
        <button class="btn-text" onclick="showLogin()">← Volver</button>
      </div>
    </div>
  </div>

  <!-- 🏠 APP SHELL -->
  <div id="appShell" style="display:none">

    <!-- Header -->
    <header class="app-header">
      <div class="header-pet" onclick="navigate('profile')" role="button" tabindex="0">
        <img id="headerPhoto" src="assets/icons/paw.svg" alt="Guts" class="header-avatar">
        <div>
          <h2 id="headerPetName">PupCare</h2>
          <small id="headerPetAge"></small>
        </div>
      </div>
      <button class="btn-icon" onclick="logout()" aria-label="Cerrar sesión" title="Cerrar sesión" style="font-size:1.2rem;">🚪</button>
      <button class="btn-icon" onclick="toggleTheme()" aria-label="Cambiar tema">
        <span id="themeIcon">☀️</span>
      </button>
    </header>

    <!-- Tab Bar -->
    <nav class="tab-bar" role="navigation" aria-label="Navegación principal">
      <button class="tab-btn active" data-view="profile"    onclick="navigate('profile')"    aria-label="Perfil">    <span>🐾</span><span>Perfil</span>    </button>
      <button class="tab-btn"        data-view="activities" onclick="navigate('activities')" aria-label="Actividad"> <span>🏃</span><span>Actividad</span> </button>
      <button class="tab-btn"        data-view="health"     onclick="navigate('health')"     aria-label="Salud">     <span>💉</span><span>Salud</span>     </button>
      <button class="tab-btn"        data-view="feeding"    onclick="navigate('feeding')"    aria-label="Comida">    <span>🍽️</span><span>Comida</span>    </button>
      <button class="tab-btn"        data-view="care"       onclick="navigate('care')"       aria-label="Cuidado">   <span>🛁</span><span>Cuidado</span>   </button>
      <button class="tab-btn"        data-view="album"      onclick="navigate('album')"      aria-label="Álbum">     <span>📸</span><span>Álbum</span>     </button>
      <button class="tab-btn"        data-view="notes"      onclick="navigate('notes')"      aria-label="Notas">     <span>📝</span><span>Notas</span>     </button>
    </nav>

    <!-- Views -->
    <main class="main-content">
      <div id="view-profile"    class="view active"></div>
      <div id="view-activities" class="view"></div>
      <div id="view-health"     class="view"></div>
      <div id="view-feeding"    class="view"></div>
      <div id="view-care"       class="view"></div>
      <div id="view-album"      class="view"></div>
      <div id="view-notes"      class="view"></div>
    </main>

  </div>

  <!-- 🗂️ MODAL -->
  <div id="modal" class="modal-overlay" style="display:none" onclick="handleModalClick(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="btn-icon" onclick="closeModal()" aria-label="Cerrar">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- ❓ CONFIRM -->
  <div id="confirmDialog" class="modal-overlay" style="display:none">
    <div class="confirm-box">
      <h3 id="confirmTitle">¿Confirmar?</h3>
      <p id="confirmMsg">Esta acción no se puede deshacer.</p>
      <div class="confirm-actions">
        <button class="btn-secondary" onclick="closeConfirm()">Cancelar</button>
        <button id="confirmOkBtn" class="btn-danger">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- 🍞 TOASTS -->
  <div id="toastContainer" role="alert" aria-live="assertive"></div>

  <!-- 📜 SCRIPTS -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/cloudinary-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/modules.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
