  <style>
    /* ========== ESTILOS (exactamente los mismos que has estado usando) ========== */
    button, .chip, .dur-btn, .tab-btn, .fab, .icon-btn, .quick, .google-btn, .primary-btn, .ghost-btn, .unit-btn, .avatar-edit, .album-delete, .btn-icon-sm, .btn-confirm-cancel, .btn-confirm-ok {
      outline: none !important;
      -webkit-tap-highlight-color: transparent !important;
      user-select: none;
    }
    .unit-toggle {
      display: inline-flex;
      background: var(--bg-2);
      border-radius: 40px;
      padding: 2px;
      border: 1px solid var(--line);
    }
    .unit-btn {
      border: none;
      background: transparent;
      padding: 8px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 40px;
      color: var(--muted);
      transition: 0.2s;
      cursor: pointer;
    }
    .unit-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(109,94,252,0.3);
    }
    :root{
      --bg: #f4f6fb; --bg-2: #eef2ff; --surface: rgba(255,255,255,.82); --surface-strong: #ffffff;
      --text: #111827; --muted: #6b7280; --line: rgba(109,94,252,.12);
      --primary: #6d5efc; --primary-2: #8b7cff; --accent: #34d399; --warning: #f59e0b;
      --danger: #ef4444; --shadow: 0 20px 45px rgba(17,24,39,.08);
      --shadow-soft: 0 10px 30px rgba(109,94,252,.10); 
      --radius-xl: 28px; --radius-lg: 22px; --radius-md: 16px; --radius-sm: 12px; --max: 1280px;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --bg-2: #1e293b; --surface: rgba(30,41,59,.85); --surface-strong: #1e293b;
      --text: #f8fafc; --muted: #94a3b8; --line: rgba(255,255,255,.1);
      --shadow: 0 20px 45px rgba(0,0,0,.4); --shadow-soft: 0 10px 30px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body{ margin:0; font-family:"Plus Jakarta Sans", sans-serif; background: var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; transition: background 0.3s ease, color 0.3s ease; }
    body::before{ content:""; position:fixed; inset:0; pointer-events:none; background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 26px 26px; mask-image: linear-gradient(180deg, rgba(0,0,0,.12), transparent 60%); z-index:0; transition: opacity 0.3s ease;}
    h1,h2,h3,h4,h5{ margin:0; font-family:"Manrope", sans-serif; letter-spacing:-.03em; }
    p{ margin:0; color:var(--muted); }
    #loginScreen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    #loginScreen .brand-mark { width: 80px; height: 80px; font-size: 40px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .app-shell, .tabbar, .fab { display: none; }
    .app-shell{ position:relative; z-index:1; max-width:var(--max); margin:0 auto; min-height:100vh; padding:24px 18px 120px; }
    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; animation:fadeUp .7s ease both; }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brand-mark{ width:46px; height:46px; border-radius:16px; background:linear-gradient(135deg, #1a0f3c, #2d1b69); box-shadow:var(--shadow-soft); position:relative; overflow:hidden; flex-shrink:0; }
    .brand-mark svg{ width:100%; height:100%; }
    @keyframes tailWag{ 0%,100%{ transform-origin:30% 50%; transform:rotate(-8deg); } 50%{ transform-origin:30% 50%; transform:rotate(14deg); } }
    @keyframes earBob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-1.5px); } }
    @keyframes eyeBlink{ 0%,92%,100%{ transform:scaleY(1); } 95%{ transform:scaleY(0.08); } }
    @keyframes tongueWag{ 0%,100%{ transform:rotate(-4deg); } 50%{ transform:rotate(4deg); } }
    .guts-tail{ animation:tailWag 1s ease-in-out infinite; }
    .guts-ear-l{ animation:earBob 1.2s ease-in-out infinite; }
    .guts-ear-r{ animation:earBob 1.2s ease-in-out infinite .15s; }
    .guts-eye-l{ animation:eyeBlink 3.5s ease-in-out infinite; transform-origin:center; }
    .guts-eye-r{ animation:eyeBlink 3.5s ease-in-out infinite .05s; transform-origin:center; }
    .guts-tongue{ animation:tongueWag 0.9s ease-in-out infinite; transform-origin:50% 0%; }
    .brand small{ display:block; font-size:.76rem; color:var(--muted); letter-spacing:.02em; margin-bottom:2px; }
    .brand strong{ font-size:1.05rem; font-weight:800; }
    .top-actions{ display:flex; gap:10px; align-items:center; }
    .icon-btn{ border:none; width:46px; height:46px; border-radius:16px; background:var(--surface); backdrop-filter: blur(16px); box-shadow:var(--shadow); cursor:pointer; transition:.2s ease; color: var(--text); display:grid; place-items:center; font-size: 1.2rem;}
    .icon-btn:hover{ transform:translateY(-2px) scale(1.02); }
    .icon-btn:active{ transform:scale(.98); }
    .layout{ display:grid; grid-template-columns:1fr; gap:14px; }
    .stack{ display:grid; gap:14px; }
    .card{ background: linear-gradient(145deg, var(--surface), var(--surface-strong)); border:1px solid var(--line); backdrop-filter: blur(16px); border-radius:var(--radius-xl); box-shadow:var(--shadow); padding:18px; position:relative; overflow:hidden; animation:fadeUp .7s ease both; transition: background 0.3s ease, border-color 0.3s ease; }
    .hero-top{ display:flex; flex-direction:column; gap:14px; align-items:flex-start; margin-bottom:14px; }
    .pet-profile{ display:flex; align-items:center; gap:14px; width:100%; }
    .avatar-wrap{ position:relative; flex-shrink:0; }
    .avatar{ width:78px; height:78px; border-radius:22px; background: var(--bg-2); border:3px solid var(--surface-strong); box-shadow:var(--shadow-soft); display:grid; place-items:center; font-size:34px; overflow:hidden; background-size:cover; background-position:center; position:relative;}
    .avatar-edit{ position:absolute; right:-8px; bottom:-8px; width:34px; height:34px; border-radius:12px; border:none; background:var(--surface-strong); box-shadow:var(--shadow); cursor:pointer; z-index:10; color: var(--text);}
    .pet-meta h1{ font-size:1.5rem; line-height:1; margin-bottom:6px; }
    .pet-meta .sub{ display:flex; flex-wrap:wrap; gap:6px 10px; color:var(--muted); font-size:.82rem; margin-bottom:8px; }
    .hero-side{ display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
    .mini-stat{ border-radius:20px; padding:12px; background:var(--surface-strong); border:1px solid var(--line); }
    .mini-stat span{ display:block; color:var(--muted); font-size:.78rem; margin-bottom:6px; }
    .mini-stat strong{ font-family:"Manrope", sans-serif; font-size:1rem; letter-spacing:-.03em; }
    .hero-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .tile{ border-radius:18px; padding:14px; background:var(--surface-strong); border:1px solid var(--line); box-shadow:var(--shadow-soft); min-height:90px; transition:.25s ease; }
    .tile:hover{ transform:translateY(-4px); }
    .tile .label{ color:var(--muted); font-size:.78rem; margin-bottom:10px; display:block; }
    .tile strong{ font-size:1.1rem; line-height:1.05; display:block; margin-bottom:8px; }
    .tile small{ display:block; color:var(--muted); }
    .section-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .section-head h2{ font-size:1.05rem; }
    .ghost-btn, .primary-btn{ border:none; border-radius:16px; padding:12px 16px; cursor:pointer; transition:.2s ease; font-weight:700; text-align: center; }
    .ghost-btn{ background:rgba(109,94,252,.08); color:var(--primary); width: auto;}
    .primary-btn{ background:linear-gradient(135deg, var(--primary), var(--primary-2)); color:white; box-shadow:0 12px 26px rgba(109,94,252,.25); }
    .ghost-btn:hover,.primary-btn:hover{ transform:translateY(-2px); }
    .google-btn { background: var(--surface-strong); color: var(--text); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; padding: 12px 16px; border-radius: 16px; cursor: pointer; transition: .2s ease; width: 100%; box-shadow: var(--shadow-soft); margin-top: 10px;}
    .google-btn:hover { transform:translateY(-2px); box-shadow: var(--shadow); }
    .task-list, .log-list{ display:grid; gap:12px; }
    .task-item, .log-item{ display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; padding:12px; border-radius:16px; background:var(--surface-strong); border:1px solid var(--line); transition:.2s ease; }
    .badge-icon{ width:42px; height:42px; border-radius:14px; display:grid; place-items:center; background:rgba(109,94,252,.10); font-size:1.1rem; }
    .item-title{ font-weight:800; color:var(--text); margin-bottom:4px; font-size:.96rem; }
    .item-meta{ font-size:.82rem; color:var(--muted); }
    .chart-box{ height:220px; border-radius:24px; background: var(--surface-strong); border:1px solid var(--line); padding:12px 12px 18px; display:flex; flex-direction:column; justify-content:space-between; }
    canvas{ width:100%; height:160px; display:block; }
    .chart-footer{ display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:.78rem; padding:0 4px; }
    .grid-2{ display:grid; grid-template-columns:1fr; gap:14px; }
    .hidden{ display:none !important; }
    .view{ display:none; animation:fadeUp .45s ease both; }
    .view.active{ display:block; }
    .form-grid{ display:grid; grid-template-columns:1fr; gap:10px; }
    .field{ display:grid; gap:8px; margin-bottom:12px; }
    .field.full{ grid-column:1 / -1; }
    .field label{ font-size:.82rem; font-weight:700; color:var(--text); opacity:0.8;}
    .input, .select{ width:100%; border:1px solid var(--line); background:var(--surface-strong); border-radius:16px; padding:14px; outline:none; transition:.2s ease; color:var(--text); font-size:16px; }
    .input:focus, .select:focus{ border-color:rgba(109,94,252,.45); box-shadow:0 0 0 4px rgba(109,94,252,.10); }
    .tabbar{ position:fixed; left:0; bottom:0; transform:none; width:100%; background:var(--surface); backdrop-filter: blur(18px); border:1px solid var(--line); border-radius:24px 24px 0 0; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); display:grid; grid-template-columns: repeat(6, 1fr); z-index:50; }
    .tab-btn{ border:none; background:transparent; color:var(--muted); border-radius:20px; padding:8px 2px; display:grid; gap:3px; place-items:center; cursor:pointer; transition:.2s ease; font-weight:700; font-size:.6rem; position:relative; }
    .tab-btn.active{ background:rgba(109,94,252,.1); color:var(--primary); transform:translateY(-2px); }
    .tab-btn.active::after{ content:''; position:absolute; bottom:0; left:10%; width:80%; height:3px; background:var(--primary); border-radius:2px; }
    .tab-btn span:first-child{ font-size:1.05rem; }
    .fab{ position:fixed; right:14px; bottom:calc(80px + env(safe-area-inset-bottom)); width:52px; height:52px; border:none; border-radius:18px; background:linear-gradient(135deg, var(--primary), var(--primary-2)); color:#fff; font-size:1.4rem; box-shadow:0 18px 36px rgba(109,94,252,.45); cursor:pointer; z-index:45; transition:.2s ease; }
    .fab:active{ transform:scale(0.94); }
    .drawer{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:70; padding:10px; align-items:flex-end; backdrop-filter: blur(4px); }
    .drawer.open{ display:flex; }
    .drawer-panel{ width:100%; max-width:760px; margin:0 auto; background:var(--surface-strong); border-radius:26px 26px 16px 16px; padding:20px 16px; box-shadow:var(--shadow); max-height:92vh; overflow:auto; transform:translateY(30px); animation:slideUp .28s ease forwards; border:1px solid var(--line); }
    .drawer-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:20px; }
    .quick-actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .quick{ text-align:left; border:none; padding:16px; border-radius:20px; background:var(--bg-2); cursor:pointer; transition:.2s ease; border:1px solid var(--line);}
    .quick:active{ transform:scale(0.97); background:var(--surface-strong);}
    .quick strong{ display:block; color:var(--text); margin-bottom:6px; font-size:.96rem; }
    .settings-group { display:grid; gap:12px; margin-bottom:24px; }
    .setting-item { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:var(--bg-2); border-radius:16px; border:1px solid var(--line); }
    .setting-item strong { font-size:.95rem; color:var(--text); display:block; margin-bottom:4px;}
    .setting-item small { color:var(--muted); font-size:.8rem;}
    .switch { position:relative; display:inline-block; width:50px; height:28px; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; inset:0; background-color:var(--muted); transition:.4s; border-radius:34px; }
    .slider:before { position:absolute; content:""; height:20px; width:20px; left:4px; bottom:4px; background-color:white; transition:.4s; border-radius:50%; }
    input:checked + .slider { background-color:var(--primary); }
    input:checked + .slider:before { transform:translateX(22px); }
    .auth-box { background:rgba(109,94,252,.05); border:1px solid rgba(109,94,252,.2); padding:20px; border-radius:20px; text-align:center; }
    .auth-box h4 { margin-bottom:8px; font-size:1.1rem; }
    .auth-box p { font-size:.85rem; margin-bottom:16px; }
    .pet-selector { font-family:"Manrope", sans-serif; font-size:clamp(1.5rem,4vw,2rem); font-weight:800; line-height:1; margin-bottom:6px; background:transparent; border:none; color:var(--text); cursor:pointer; outline:none; padding:0; appearance:none; display:inline-block; text-decoration:underline; text-decoration-color:var(--primary); text-decoration-thickness:3px; }
    @keyframes fadeUp{ from{ opacity:0; transform:translateY(18px); } to{ opacity:1; transform:translateY(0); } }
    @keyframes slideUp{ to{ transform:translateY(0); } }
    @keyframes toastIn{ from{ opacity:0; transform:translateY(20px) scale(.95); } to{ opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut{ to{ opacity:0; transform:translateY(20px) scale(.95); } }
    #toastContainer{ position:fixed; bottom:calc(80px + env(safe-area-inset-bottom) + 8px); left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:10px; align-items:center; pointer-events:none; }
    .toast{ display:flex; align-items:center; gap:10px; padding:11px 16px; border-radius:20px; background:var(--surface-strong); border:1px solid var(--line); box-shadow:var(--shadow); font-weight:600; font-size:.85rem; pointer-events:all; animation:toastIn .28s ease both; min-width:180px; max-width:90vw; }
    .toast.success{ border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.12); color:#059669; }
    .toast.error{ border-color:rgba(239,68,68,.3); background:rgba(239,68,68,.10); color:#dc2626; }
    .toast.info{ border-color:rgba(109,94,252,.25); background:rgba(109,94,252,.08); color:var(--primary); }
    .toast.warning{ border-color:rgba(245,158,11,.3); background:rgba(245,158,11,.08); color:#b45309; }
    .toast-icon{ font-size:1.15rem; flex-shrink:0; }
    .item-actions{ display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .btn-icon-sm{ border:none; width:32px; height:32px; border-radius:10px; cursor:pointer; display:grid; place-items:center; font-size:.85rem; transition:.18s ease; background:transparent; color:var(--muted); }
    .btn-icon-sm:active{ transform:scale(0.9);}
    .btn-edit:active{ background:rgba(109,94,252,.2); }
    .btn-delete:active{ background:rgba(239,68,68,.2); }
    .confirm-modal{ position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9500; display:none; align-items:center; justify-content:center; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); backdrop-filter:blur(6px); }
    .confirm-modal.open{ display:flex; }
    .confirm-box{ background:var(--surface-strong); border:1px solid var(--line); border-radius:var(--radius-xl); padding:28px 24px; max-width:340px; width:100%; box-shadow:0 32px 64px rgba(0,0,0,.22); animation:scaleIn .22s ease both; text-align:center; position:relative; }
    @keyframes scaleIn{ from{ opacity:0; transform:scale(.92) translateY(12px); } to{ opacity:1; transform:scale(1) translateY(0); } }
    .confirm-box h3{ margin-bottom:8px; font-size:1.05rem; }
    .confirm-box p{ font-size:.86rem; margin-bottom:22px; color:var(--muted); }
    .confirm-actions{ display:flex; gap:10px; }
    .btn-confirm-cancel{ flex:1; padding:13px; border:1.5px solid var(--line); border-radius:14px; background:transparent; color:var(--text); cursor:pointer; font-weight:700; transition:.18s; font-size:.9rem; }
    .btn-confirm-ok{ flex:1; padding:13px; border:none; border-radius:14px; background:var(--danger); color:white; cursor:pointer; font-weight:700; transition:.18s; box-shadow:0 6px 18px rgba(239,68,68,.28); font-size:.9rem; }
    .btn-confirm-cancel:active{ background:var(--bg-2); transform:scale(0.97);}
    .btn-confirm-ok:active{ transform:scale(.97); }
    .chip-group{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:4px; }
    .chip{ border:1.5px solid var(--line); background:var(--bg-2); color:var(--text); border-radius:50px; padding:10px 14px; font-size:.88rem; font-weight:700; cursor:pointer; transition:.18s ease; display:flex; align-items:center; gap:6px; }
    .chip:active{ transform:scale(0.96); background:var(--primary); color:white; border-color:var(--primary);}

  <!-- ========== FIREBASE SDK ========== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, set, get, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA4WoVC9xK7bR5buMHsx9TvbpilGxGc7fo",
      authDomain: "pupcare-68e86.firebaseapp.com",
      databaseURL: "https://pupcare-68e86-default-rtdb.firebaseio.com",
      projectId: "pupcare-68e86",
      storageBucket: "pupcare-68e86.firebasestorage.app",
      messagingSenderId: "324660274249",
      appId: "1:324660274249:web:913e9514a760d6c9124b98"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    // Exponer globalmente para que el resto del script los use
    window.firebaseAuth = auth;
    window.firebaseDb = db;
    window.firebaseRef = ref;
    window.firebaseSet = set;
    window.firebaseGet = get;
    window.firebasePush = push;
    window.firebaseRemove = remove;
    window.firebaseOnValue = onValue;

    // Login con Google
    window.loginWithGoogle = async function() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        console.log("Login Google OK:", result.user.email);
      } catch (e) {
        alert("Error Google: " + e.message);
      }
    };

    // Login con correo
    window.loginUser = async function() {
      const email = document.getElementById("authEmail").value;
      const pass  = document.getElementById("authPassword").value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        alert("Error al entrar: " + e.message);
      }
    };

    // Registro con correo
    window.registerUser = async function() {
      const email = document.getElementById("authEmail").value;
      const pass  = document.getElementById("authPassword").value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        alert("Error al crear cuenta: " + e.message);
      }
    };

    // Cerrar sesión
    window.logoutUser = async function() {
      await signOut(auth);
    };

    // Observar estado de autenticación
    onAuthStateChanged(auth, (user) => {
      const loginScreen  = document.getElementById("loginScreen");
      const loadingScreen = document.getElementById("loadingScreen");
      const appShell    = document.querySelector(".app-shell");
      const tabbar      = document.querySelector(".tabbar");
      const fab         = document.querySelector(".fab");

      if (loadingScreen) loadingScreen.style.display = "none";

      if (user) {
        // Usuario autenticado → mostrar app
        if (loginScreen)  loginScreen.style.display  = "none";
        if (appShell)     appShell.style.display      = "block";
        if (tabbar)       tabbar.style.display        = "flex";
        if (fab)          fab.style.display           = "flex";
        // Disparar evento para que la app cargue datos
        window.dispatchEvent(new CustomEvent("pupcare:user", { detail: user }));
      } else {
        // Sin sesión → mostrar login
        if (loginScreen)  loginScreen.style.display  = "flex";
        if (appShell)     appShell.style.display      = "none";
        if (tabbar)       tabbar.style.display        = "none";
        if (fab)          fab.style.display           = "none";
      }
    });
  </script>
